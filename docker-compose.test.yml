# Compose override for API e2e tests.
# Usage: docker compose -f docker-compose.yml -f docker-compose.test.yml run --rm api-e2e
services:
  postgres-test:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatlab_test
      POSTGRES_PASSWORD: chatlab_test
      POSTGRES_DB: chatlab_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatlab_test"]
      interval: 5s
      timeout: 5s
      retries: 5

  api-e2e:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: test
    working_dir: /app/apps/api
    command: ["npm", "run", "test:e2e"]
    env_file:
      - apps/api/.env
    environment:
      DATABASE_URL: postgresql://chatlab_test:chatlab_test@postgres-test:5432/chatlab_test
      DATABASE_URL_UNPOOLED: postgresql://chatlab_test:chatlab_test@postgres-test:5432/chatlab_test
      NODE_ENV: test
    depends_on:
      postgres-test:
        condition: service_healthy
