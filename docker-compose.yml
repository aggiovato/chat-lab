services:
  traefik:
    image: traefik:v3
    command:
      - --providers.docker=true
      - --providers.docker.exposedbydefault=false
      - --entrypoints.web.address=:80
      - --api.dashboard=true
      - --api.insecure=true
    ports:
      - "80:80"
      - "8080:8080"   # Traefik dashboard → http://localhost:8080
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chatlab
      POSTGRES_PASSWORD: chatlab
      POSTGRES_DB: chatlab
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chatlab"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      target: production
    env_file:
      - apps/api/.env
    environment:
      # Overrides DATABASE_URL from .env to point to the local postgres container
      DATABASE_URL: postgresql://chatlab:chatlab@postgres:5432/chatlab
      DATABASE_URL_UNPOOLED: postgresql://chatlab:chatlab@postgres:5432/chatlab
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.chat.local`)"
      - "traefik.http.services.api.loadbalancer.server.port=3000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: production
    depends_on:
      - api
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`chat.local`)"
      - "traefik.http.services.web.loadbalancer.server.port=80"

volumes:
  postgres_data:
